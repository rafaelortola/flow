<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceFlow — Cadastro</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="brand">
        <div class="logo">FF</div>
        <h1>FinanceFlow</h1>
        <p>Crie sua conta</p>
      </div>

      <form id="registerForm">
        <div id="errorBox" class="error hidden"></div>

        <label for="name">Nome</label>
        <input type="text" id="name" name="name" placeholder="Seu nome" required autocomplete="name" />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email" />

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password" />

        <label for="confirmPassword">Confirmar senha</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repita a senha" required minlength="6" autocomplete="new-password" />

        <button type="submit" id="submitBtn">Cadastrar</button>
      </form>

      <p class="hint">Já tem conta? <a href="/">Entrar</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/cadastro.js"></script>
</body>
</html>
