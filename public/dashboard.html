<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceFlow — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo small">FF</div>
        <span>FinanceFlow</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="active">Dashboard</a>
        <a href="/mes.html">Controle Mensal</a>
        <a href="/categorias.html">Categorias</a>
        <a href="/relatorios.html">Relatórios</a>
      </nav>
      <button id="logoutBtn" class="btn-outline sidebar-logout">Sair</button>
    </aside>

    <div class="content">
      <header class="content-header">
        <div>
          <h1>Dashboard <span id="yearLabel">2026</span></h1>
          <p class="subtitle">Olá, <span id="userGreeting">...</span></p>
        </div>
        <div class="period-select">
          <select id="yearSelect"></select>
        </div>
      </header>

      <div class="stats stats-3">
        <div class="stat green">
          <span class="label">Receita Anual</span>
          <span class="value" id="totalReceita">R$ 0,00</span>
        </div>
        <div class="stat red">
          <span class="label">Despesas Anuais</span>
          <span class="value" id="totalDespesas">R$ 0,00</span>
        </div>
        <div class="stat blue">
          <span class="label">Sobra Anual</span>
          <span class="value" id="totalSobra">R$ 0,00</span>
        </div>
      </div>

      <section class="panel">
        <div class="panel-header"><h2>Resumo por mês</h2></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Mês</th>
                <th>Receita</th>
                <th>Despesas</th>
                <th>Essenciais</th>
                <th>Dívidas</th>
                <th>Cartões</th>
                <th>Sobra</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="monthsTable"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header"><h2>Gastos por categoria</h2></div>
        <div id="categoryBreakdown" class="category-breakdown"></div>
      </section>

      <section class="panel">
        <div class="panel-header"><h2>Gráfico — Sobra mensal</h2></div>
        <div id="chartBars" class="chart-bars"></div>
      </section>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/ui-helpers.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
