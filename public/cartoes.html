<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceFlow — Cartões</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo small">FF</div>
        <span>FinanceFlow</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/mes.html">Controle Mensal</a>
        <a href="/categorias.html">Categorias</a>
        <a href="/cartoes.html" class="active">Cartões</a>
        <a href="/relatorios.html">Relatórios</a>
      </nav>
      <button id="logoutBtn" class="btn-outline sidebar-logout">Sair</button>
    </aside>

    <div class="content">
      <header class="content-header">
        <div>
          <h1>Cartões</h1>
          <p class="subtitle" id="userGreeting">...</p>
        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <h2 id="cardFormTitle">Novo cartão</h2>
        </div>
        <form id="cardForm" class="inline-form">
          <label>
            Nome
            <input type="text" id="cardName" placeholder="Ex: Nubank, Itaú..." required />
          </label>
          <label>
            Cor
            <input type="color" id="cardColor" value="#a855f7" title="Cor de identificação do cartão" />
          </label>
          <label>
            Fechamento
            <input type="number" id="cardClosingDay" min="1" max="31" placeholder="Dia 1–31" />
          </label>
          <label>
            Vencimento
            <input type="number" id="cardDueDay" min="1" max="31" placeholder="Dia 1–31" />
          </label>
          <label>
            Limite (R$)
            <input type="number" id="cardCreditLimit" min="0" step="0.01" placeholder="Ex: 5000" />
          </label>
          <button type="submit" id="cardSubmitBtn" class="btn-primary">Adicionar</button>
          <button type="button" id="cancelEditBtn" class="btn-outline hidden">Cancelar</button>
        </form>
        <p id="cardError" class="error hidden" role="alert"></p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Lista de cartões</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Cor</th>
                <th>Nome</th>
                <th>Fechamento</th>
                <th>Vencimento</th>
                <th>Limite</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cardsTable"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/ui-helpers.js"></script>
  <script src="/js/cartoes.js"></script>
</body>
</html>
