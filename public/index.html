<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceFlow — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="brand">
        <div class="logo">FF</div>
        <h1>FinanceFlow</h1>
        <p>Controle financeiro simples</p>
      </div>

      <form id="loginForm">
        <div id="errorBox" class="error hidden"></div>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required />

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />

        <button type="submit" id="submitBtn">Entrar</button>
      </form>

      <p class="hint">Não tem conta? <a href="/cadastro.html">Cadastre-se</a></p>
      <p class="hint hint-demo">Demo: <strong>demo@financeflow.com</strong> / <strong>demo123456</strong></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
