packages:
  - "apps/*"

# Allow installing packages published within the last 24h (pnpm 11 default blocks them).
minimumReleaseAge: 0

# pnpm 11: allow postinstall scripts required by Prisma, Next.js, etc.
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  esbuild: true
  sharp: true
  unrs-resolver: true
